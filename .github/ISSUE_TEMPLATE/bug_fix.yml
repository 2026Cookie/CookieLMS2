name: "🐛 Bug Fix"
description: 오류를 수정할 때 사용하는 템플릿입니다
labels: ["FIX"]
body:
  - type: input
    id: location
    attributes:
      label: 문제 지점
      placeholder: module/login
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: 문제 설명
      placeholder: 어떤 상황에서 어떤 문제가 발생하는지 설명해주세요
    validations:
      required: true

  - type: textarea
    id: error-code
    attributes:
      label: 오류 코드
      render: shell
      placeholder: 에러 로그 또는 오류 메시지를 붙여넣어 주세요
    validations:
      required: true

  - type: textarea
    id: checklist
    attributes:
      label: 수정 체크리스트
      value: |
        - [ ] 원인 파악
        - [ ] 수정 완료
        - [ ] 테스트 확인
