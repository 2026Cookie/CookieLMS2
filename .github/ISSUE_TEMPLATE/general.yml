name: "📋 General"
description: 기획, 문서작성, 발표등 일반 작업에 사용하는 템플릿입니다
labels: ["general"]
body:
  - type: textarea
    id: content
    attributes:
      label: 작업 내용
      placeholder: 어떤 작업인지 설명해주세요
    validations:
      required: true

  - type: textarea
    id: checklist
    attributes:
      label: 체크리스트
      value: |
        - [ ] 
        - [ ] 
        - [ ] 
    validations:
      required: true

  - type: textarea
    id: notes
    attributes:
      label: 참고사항
      placeholder: 관련 이슈 링크, 참고 자료 등
