spring:
  application:
    name: CookieLMS

  # 데이터베이스 연결 정보
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/CoookieLMS
    username: cookie
    password: cookie

  # JPA (데이터베이스 조작) 설정
  jpa:
    hibernate:
      # 테이블은 우리가 워크벤치에서 만들었으니 스프링은 건드리지 마!
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true