<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cookiego - 메인 페이지</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .container {
            text-align: center;
            background-color: white;
            padding: 60px 40px;
            border-radius: 12px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
            max-width: 600px;
        }

        h1 {
            font-size: 36px;
            color: #2c3e50;
            margin-bottom: 15px;
        }

        p {
            font-size: 16px;
            color: #7f8c8d;
            margin-bottom: 40px;
        }

        .button-group {
            display: flex;
            gap: 15px;
            flex-direction: column;
        }

        .btn {
            padding: 16px 30px;
            font-size: 16px;
            font-weight: bold;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            text-decoration: none;
            display: inline-block;
            transition: all 0.3s ease;
        }

        .btn-admin {
            background-color: #e74c3c;
            color: white;
        }

        .btn-admin:hover {
            background-color: #c0392b;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(231, 76, 60, 0.3);
        }

        .btn-instructor {
            background-color: #3498db;
            color: white;
        }

        .btn-instructor:hover {
            background-color: #2980b9;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(52, 152, 219, 0.3);
        }

        .btn-student {
            background-color: #27ae60;
            color: white;
        }

        .btn-student:hover {
            background-color: #229954;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(39, 174, 96, 0.3);
        }

        @media (max-width: 600px) {
            .container {
                padding: 40px 20px;
            }

            h1 {
                font-size: 24px;
            }

            .btn {
                padding: 14px 20px;
                font-size: 14px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎓 Cookiego</h1>
        <p>어디로 이동하시겠습니까?</p>

        <div class="button-group">
            <a href="/admin" class="btn btn-admin">🔐 관리자</a>
            <a href="/instructor" class="btn btn-instructor">👨‍🏫 강사</a>
            <a href="/student" class="btn btn-student">👨‍🎓 학생</a>
        </div>
    </div>
</body>
</html>
