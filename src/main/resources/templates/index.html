<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cookiego</title>
    <style>
        :root {
            --parchment: #edede9; --dust-grey: #d6ccc2; --linen: #f5ebe0;
            --powder-petal: #e3d5ca; --almond-silk: #d5bdaf;
            --text-primary: #2c2010; --text-secondary: #5c4a3a;
            --text-muted: #8b7355; --text-on-dark: #f5ebe0;
            --btn-dark: #4a3728; --btn-dark-hover: #2c2010;
            --shadow: rgba(44,32,16,0.10);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: var(--parchment);
            min-height: 100vh;
            display: flex; justify-content: center; align-items: center;
            color: var(--text-primary);
        }
        .card {
            background: var(--linen);
            border: 1px solid var(--dust-grey);
            border-radius: 16px;
            box-shadow: 0 4px 24px var(--shadow);
            padding: 56px 48px;
            width: 100%; max-width: 420px;
            text-align: center;
        }
        .logo { font-size: 32px; font-weight: 800; color: var(--text-primary); margin-bottom: 6px; letter-spacing: -0.5px; }
        .tagline { font-size: 14px; color: var(--text-muted); margin-bottom: 40px; }
        .btn-group { display: flex; flex-direction: column; gap: 12px; }
        .btn {
            display: block; padding: 13px 20px;
            border-radius: 8px; font-size: 15px; font-weight: 600;
            cursor: pointer; border: none; text-decoration: none;
            transition: all 0.2s;
        }
        .btn-primary { background: var(--btn-dark); color: var(--text-on-dark); }
        .btn-primary:hover { background: var(--btn-dark-hover); transform: translateY(-1px); }
        .btn-secondary { background: var(--almond-silk); color: var(--text-primary); }
        .btn-secondary:hover { background: var(--powder-petal); transform: translateY(-1px); }
        .btn-outline {
            background: transparent; border: 1.5px solid var(--almond-silk);
            color: var(--text-secondary);
        }
        .btn-outline:hover { background: var(--powder-petal); }
        .divider { height: 1px; background: var(--dust-grey); margin: 8px 0; }
        @media (max-width: 480px) { .card { padding: 40px 24px; } }
    </style>
</head>
<body>
<div class="card">
    <div class="logo">Cookiego</div>
    <div class="tagline">학습 관리 시스템</div>

    <div class="btn-group">
        <div sec:authorize="isAnonymous()">
            <a th:href="@{/user/login}" class="btn btn-primary" style="display:block; margin-bottom:12px;">로그인</a>
            <a th:href="@{/user/join}" class="btn btn-secondary" style="display:block;">회원가입</a>
        </div>

        <div sec:authorize="hasRole('INSTRUCTOR')">
            <a th:href="@{/instructor/main}" class="btn btn-primary" style="display:block;">강사 페이지</a>
        </div>

        <div sec:authorize="hasRole('USER')">
            <a th:href="@{/user/main}" class="btn btn-primary" style="display:block;">학생 페이지</a>
        </div>

        <div sec:authorize="isAuthenticated()">
            <div class="divider"></div>
            <form th:action="@{/logout}" method="post">
                <button type="submit" class="btn btn-outline" style="width:100%;">로그아웃</button>
            </form>
        </div>
    </div>
</div>
</body>
</html>
