<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>관리자 대시보드 - Cookiego</title>
    <style>
        :root {
            --parchment: #edede9; --dust-grey: #d6ccc2; --linen: #f5ebe0;
            --powder-petal: #e3d5ca; --almond-silk: #d5bdaf;
            --text-primary: #2c2010; --text-secondary: #5c4a3a;
            --text-muted: #8b7355; --text-on-dark: #f5ebe0;
            --btn-dark: #4a3728; --btn-dark-hover: #2c2010;
            --error: #7a3020; --success: #3a6a50; --warning: #7a5c20;
            --shadow: rgba(44,32,16,0.10);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', system-ui, sans-serif; background: var(--parchment); color: var(--text-primary); min-height: 100vh; }
        header {
            background: var(--btn-dark); color: var(--text-on-dark);
            padding: 18px 32px; display: flex; align-items: center; justify-content: space-between;
        }
        .header-left h1 { font-size: 20px; font-weight: 700; }
        .header-left p { font-size: 13px; opacity: 0.7; margin-top: 2px; }
        .main { max-width: 1360px; margin: 0 auto; padding: 32px 24px; }
        .dashboard-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 20px; }
        .widget-full { grid-column: 1 / -1; }
        .widget {
            background: var(--linen); border: 1px solid var(--dust-grey);
            border-radius: 12px; box-shadow: 0 2px 12px var(--shadow);
            overflow: hidden;
        }
        .widget-header {
            display: flex; justify-content: space-between; align-items: center;
            padding: 14px 18px; background: var(--powder-petal);
            border-bottom: 1px solid var(--dust-grey);
        }
        .widget-header h2 { font-size: 15px; font-weight: 700; }
        .widget-header button {
            padding: 6px 14px; background: var(--btn-dark); color: var(--text-on-dark);
            border: none; border-radius: 6px; font-size: 12px; font-weight: 600;
            cursor: pointer;
        }
        .widget-header button:hover { background: var(--btn-dark-hover); }
        .widget-content { min-height: 200px; max-height: 420px; overflow-y: auto; padding: 4px 0; }
        .loading { text-align: center; color: var(--text-muted); padding: 40px; font-size: 14px; }
        .data-table { width: 100%; border-collapse: collapse; font-size: 13px; }
        .data-table th {
            background: var(--parchment); padding: 10px 14px; text-align: left;
            font-size: 12px; font-weight: 700; color: var(--text-muted);
            border-bottom: 1px solid var(--dust-grey); text-transform: uppercase; letter-spacing: 0.3px;
        }
        .data-table td { padding: 10px 14px; border-bottom: 1px solid var(--dust-grey); }
        .data-table tr:last-child td { border-bottom: none; }
        .data-table tr:hover td { background: var(--powder-petal); }
        .badge { display: inline-block; padding: 3px 8px; border-radius: 10px; font-size: 11px; font-weight: 700; }
        .badge-danger { background: #f9ede9; color: var(--error); }
        .badge-success { background: #eaf2ed; color: var(--success); }
        .badge-warning { background: #f9f0e0; color: var(--warning); }
        .info-box { background: var(--powder-petal); border-left: 3px solid var(--almond-silk); border-radius: 6px; padding: 12px 16px; font-size: 13px; color: var(--text-secondary); margin: 12px; }
        .msg-error { color: var(--error); background: #f9ede9; border: 1px solid #e8c8c0; border-radius: 8px; padding: 10px 14px; font-size: 13px; margin: 12px; }
        .section-title { font-size: 12px; font-weight: 700; color: var(--text-muted); padding: 12px 14px 6px; text-transform: uppercase; letter-spacing: 0.3px; }
        .pagination { display: flex; justify-content: center; align-items: center; gap: 8px; padding: 12px; font-size: 13px; }
        .pagination button { padding: 4px 12px; background: var(--btn-dark); color: var(--text-on-dark); border: none; border-radius: 5px; cursor: pointer; font-size: 12px; }
        .pagination button:disabled { background: var(--dust-grey); cursor: default; }
        .link-btn { background: none; border: none; color: #4a3728; text-decoration: underline; cursor: pointer; font-size: 12px; padding: 0; }
        .action-btn { padding: 4px 10px; border: none; border-radius: 5px; font-size: 12px; cursor: pointer; color: #fff; }
        .ban-btn { background: var(--error); }
        .unban-btn { background: var(--success); }

        /* 모달 */
        .modal-overlay {
            display: none; position: fixed; inset: 0;
            background: rgba(0,0,0,0.45); z-index: 100;
            justify-content: center; align-items: flex-start; padding-top: 60px;
        }
        .modal-overlay.active { display: flex; }
        .modal {
            background: var(--linen); border-radius: 12px; width: 780px; max-width: 95vw;
            max-height: 80vh; overflow-y: auto; box-shadow: 0 8px 32px rgba(0,0,0,0.2);
        }
        .modal-header {
            display: flex; justify-content: space-between; align-items: center;
            padding: 16px 20px; background: var(--powder-petal);
            border-bottom: 1px solid var(--dust-grey); position: sticky; top: 0;
        }
        .modal-header h3 { font-size: 15px; font-weight: 700; }
        .modal-close { background: none; border: none; font-size: 20px; cursor: pointer; color: var(--text-muted); }
        .modal-body { padding: 16px 20px; }

        @media (max-width: 900px) { .dashboard-grid { grid-template-columns: 1fr; } .widget-full { grid-column: 1; } }
    </style>
</head>
<body>
<header>
    <div class="header-left">
        <h1>관리자 대시보드</h1>
        <p>시스템 모니터링 및 관리 센터</p>
    </div>
</header>

<div class="main">
    <div class="dashboard-grid">

        <!-- 섹션 1: 트래픽 분석 -->
        <div class="widget">
            <div class="widget-header">
                <h2>📊 트래픽 분석</h2>
                <button onclick="loadTraffic()">새로고침</button>
            </div>
            <div class="widget-content" id="trafficContent"><div class="loading">데이터를 불러오는 중...</div></div>
        </div>

        <!-- 섹션 2: 성능 병목 -->
        <div class="widget">
            <div class="widget-header">
                <h2>⚡ 성능 병목</h2>
                <button onclick="loadPerformance()">새로고침</button>
            </div>
            <div class="widget-content" id="performanceContent"><div class="loading">데이터를 불러오는 중...</div></div>
        </div>

        <!-- 섹션 3: CRITICAL 에러 (전체 너비) -->
        <div class="widget widget-full">
            <div class="widget-header">
                <h2>⚠️ CRITICAL 에러</h2>
                <button onclick="loadErrors(0)">새로고침</button>
            </div>
            <div class="widget-content" id="errorsContent"><div class="loading">데이터를 불러오는 중...</div></div>
            <div class="pagination" id="errorsPagination"></div>
        </div>

        <!-- 섹션 4a: 회원 관리 -->
        <div class="widget">
            <div class="widget-header">
                <h2>👥 회원 관리</h2>
                <button onclick="loadUsers()">새로고침</button>
            </div>
            <div class="widget-content" id="usersContent"><div class="loading">데이터를 불러오는 중...</div></div>
        </div>

        <!-- 섹션 4b: 밴 유저 -->
        <div class="widget">
            <div class="widget-header">
                <h2>🚫 현재 밴 유저</h2>
                <button onclick="loadRecentBans()">새로고침</button>
            </div>
            <div class="widget-content" id="recentBansContent"><div class="loading">데이터를 불러오는 중...</div></div>
        </div>

        <!-- 섹션 5: 탈퇴 회원 -->
        <div class="widget widget-full">
            <div class="widget-header">
                <h2>🗑️ 탈퇴 회원</h2>
                <button onclick="loadWithdrawnUsers()">새로고침</button>
            </div>
            <div class="widget-content" id="withdrawnContent"><div class="loading">데이터를 불러오는 중...</div></div>
        </div>

    </div>
</div>

<!-- 모달: traceId 드릴다운 -->
<div id="traceModal" class="modal-overlay" onclick="closeModal('traceModal', event)">
    <div class="modal">
        <div class="modal-header">
            <h3>요청 흐름 추적</h3>
            <button class="modal-close" onclick="closeModalById('traceModal')">✕</button>
        </div>
        <div class="modal-body" id="traceModalBody"><div class="loading">불러오는 중...</div></div>
    </div>
</div>

<!-- 모달: 유저 상세 -->
<div id="userModal" class="modal-overlay" onclick="closeModal('userModal', event)">
    <div class="modal">
        <div class="modal-header">
            <h3 id="userModalTitle">유저 상세</h3>
            <button class="modal-close" onclick="closeModalById('userModal')">✕</button>
        </div>
        <div class="modal-body" id="userModalBody"><div class="loading">불러오는 중...</div></div>
    </div>
</div>

<script>
    // ── 공통 유틸 ──────────────────────────────────────────
    let errorsCurrentPage = 0;
    let errorsTotalPages = 0;

    function fetchWidget(url, contentId, onSuccess) {
        const el = document.getElementById(contentId);
        el.innerHTML = '<div class="loading">데이터를 불러오는 중...</div>';
        fetch(url).then(r => r.json()).then(d => onSuccess(d, el))
            .catch(() => { el.innerHTML = '<div class="msg-error">데이터를 불러올 수 없습니다.</div>'; });
    }

    function closeModal(modalId, event) {
        if (event.target.id === modalId) closeModalById(modalId);
    }
    function closeModalById(modalId) {
        document.getElementById(modalId).classList.remove('active');
    }

    // ── 섹션 1: 트래픽 ──────────────────────────────────────
    function loadTraffic() {
        fetchWidget('/admin/logs/traffic', 'trafficContent', displayTraffic);
    }
    function displayTraffic(data, el) {
        let html = '';

        html += '<div class="section-title">시간대별 호출 (오늘)</div>';
        if (data.hourlyTraffic && data.hourlyTraffic.length > 0) {
            html += '<table class="data-table"><thead><tr><th>시간</th><th>호출 수</th></tr></thead><tbody>';
            (data.hourlyTraffic || []).forEach(h => {
                html += `<tr><td>${String(h.hour).padStart(2,'0')}:00</td><td>${h.callCount}</td></tr>`;
            });
            html += '</tbody></table>';
        } else {
            html += '<div class="info-box">데이터가 없습니다.</div>';
        }

        html += '<div class="section-title" style="margin-top:12px;">Top 10 엔드포인트 (최근 7일)</div>';
        if (data.topEndpoints && data.topEndpoints.length > 0) {
            html += '<table class="data-table"><thead><tr><th>엔드포인트</th><th>호출 수</th></tr></thead><tbody>';
            (data.topEndpoints || []).forEach(e => {
                html += `<tr><td>${e.endpoint}</td><td>${e.callCount}</td></tr>`;
            });
            html += '</tbody></table>';
        } else {
            html += '<div class="info-box">데이터가 없습니다.</div>';
        }

        html += '<div class="section-title" style="margin-top:12px;">느린 엔드포인트</div>';
        if (data.slowEndpoints && data.slowEndpoints.length > 0) {
            html += '<table class="data-table"><thead><tr><th>엔드포인트</th><th>평균(ms)</th><th>추적</th></tr></thead><tbody>';
            (data.slowEndpoints || []).forEach(e => {
                const traceBtn = e.traceId
                    ? `<button class="link-btn" onclick="openTraceModal('${e.traceId}')">🔗</button>`
                    : '-';
                html += `<tr><td>${e.endpoint}</td><td>${e.avgMs.toFixed(2)}</td><td>${traceBtn}</td></tr>`;
            });
            html += '</tbody></table>';
        } else {
            html += '<div class="info-box">데이터가 없습니다.</div>';
        }

        el.innerHTML = html;
    }

    // ── 섹션 2: 성능 병목 ──────────────────────────────────
    function loadPerformance() {
        fetchWidget('/admin/logs/performance', 'performanceContent', displayPerformance);
    }
    function displayPerformance(data, el) {
        let html = '';

        html += '<div class="section-title">느린 기능 Top 10</div>';
        if (data.slowMethods && data.slowMethods.length > 0) {
            html += '<table class="data-table"><thead><tr><th>메서드</th><th>평균(ms)</th><th>최대(ms)</th><th>호출</th><th>추적</th></tr></thead><tbody>';
            data.slowMethods.forEach(m => {
                const traceBtn = m.sampleTraceId
                    ? `<button class="link-btn" onclick="openTraceModal('${m.sampleTraceId}')">🔗</button>`
                    : '-';
                html += `<tr>
                    <td>${m.classMethod}</td>
                    <td>${m.avgExecutionTimeMs.toFixed(2)}</td>
                    <td>${m.maxExecutionTimeMs}</td>
                    <td>${m.callCount}</td>
                    <td>${traceBtn}</td>
                </tr>`;
            });
            html += '</tbody></table>';
        } else {
            html += '<div class="info-box">데이터가 없습니다.</div>';
        }

        html += '<div class="section-title" style="margin-top:12px;">실패 기능 Top 10</div>';
        if (data.failureMethods && data.failureMethods.length > 0) {
            html += '<table class="data-table"><thead><tr><th>메서드</th><th>실패</th><th>성공</th><th>실패율</th><th>추적</th></tr></thead><tbody>';
            data.failureMethods.forEach(m => {
                const failureRate = m.totalCalls > 0 ? ((m.failureCount / m.totalCalls) * 100).toFixed(1) : 0;
                const traceBtn = m.sampleTraceId
                    ? `<button class="link-btn" onclick="openTraceModal('${m.sampleTraceId}')">🔗</button>`
                    : '-';
                html += `<tr>
                    <td>${m.classMethod}</td>
                    <td><span class="badge badge-danger">${m.failureCount}</span></td>
                    <td><span class="badge badge-success">${m.successCount}</span></td>
                    <td>${failureRate}%</td>
                    <td>${traceBtn}</td>
                </tr>`;
            });
            html += '</tbody></table>';
        } else {
            html += '<div class="info-box">데이터가 없습니다.</div>';
        }

        el.innerHTML = html;
    }

    // ── 섹션 3: CRITICAL 에러 ───────────────────────────────
    function loadErrors() {
        fetchWidget('/admin/logs/errors', 'errorsContent', displayErrors);
    }
    function displayErrors(data, el) {
        if (!data || data.length === 0) { el.innerHTML = '<div class="info-box">CRITICAL 에러가 없습니다.</div>'; return; }
        let html = '<table class="data-table"><thead><tr><th>아이디</th><th>CRITICAL 에러 수</th><th>상세</th></tr></thead><tbody>';
        data.forEach(row => {
            const userId = row.userId || row.userid;
            const loginId = row.loginId || row.loginid;
            const count = row.errorCount || row.errorcount;
            const userCell = loginId ? `<button class="link-btn" onclick="openUserModal(${userId}, '${loginId}')">${loginId}</button>` : '비로그인';
            const detailBtn = userId ? `<button class="link-btn" onclick="openUserModal(${userId}, '${loginId}')">이력 보기</button>` : '-';
            html += `<tr>
                <td>${userCell}</td>
                <td><span class="badge badge-danger">${count}건</span></td>
                <td>${detailBtn}</td>
            </tr>`;
        });
        html += '</tbody></table>';
        el.innerHTML = html;
    }

    function renderErrorsPagination() {
        const el = document.getElementById('errorsPagination');
        el.innerHTML = `
            <button onclick="loadErrors(${errorsCurrentPage - 1})" ${errorsCurrentPage === 0 ? 'disabled' : ''}>◀ 이전</button>
            <span>${errorsCurrentPage + 1} / ${errorsTotalPages}</span>
            <button onclick="loadErrors(${errorsCurrentPage + 1})" ${errorsCurrentPage >= errorsTotalPages - 1 ? 'disabled' : ''}>다음 ▶</button>
        `;
    }

    // ── traceId 드릴다운 모달 ──────────────────────────────
    function openTraceModal(traceId) {
        document.getElementById('traceModal').classList.add('active');
        const body = document.getElementById('traceModalBody');
        body.innerHTML = '<div class="loading">불러오는 중...</div>';
        fetch(`/admin/logs/trace/${traceId}`)
            .then(r => r.json())
            .then(data => displayTraceDetail(data, body))
            .catch(() => { body.innerHTML = '<div class="msg-error">데이터를 불러올 수 없습니다.</div>'; });
    }
    function displayTraceDetail(data, el) {
        let html = `<p style="font-size:12px;color:var(--text-muted);margin-bottom:12px;">TraceId: <b>${data.traceId}</b></p>`;

        html += '<div class="section-title">API 요청</div>';
        if (data.apiLog) {
            html += `<table class="data-table"><thead><tr><th>엔드포인트</th><th>메서드</th><th>실행시간(ms)</th><th>상태</th><th>시각</th></tr></thead><tbody>`;
            const time = data.apiLog.createdAt ? data.apiLog.createdAt.replace('T',' ').substring(0,19) : '-';
            html += `<tr>
                <td>${data.apiLog.endpoint}</td>
                <td>${data.apiLog.httpMethod}</td>
                <td>${data.apiLog.executionTimeMs}</td>
                <td>${data.apiLog.statusCode}</td>
                <td>${time}</td>
            </tr></tbody></table>`;
        } else {
            html += '<div class="info-box">API 로그가 없습니다.</div>';
        }

        html += '<div class="section-title" style="margin-top:12px;">서비스 로그</div>';
        if (data.serviceLogs && data.serviceLogs.length > 0) {
            html += '<table class="data-table"><thead><tr><th>메서드</th><th>실행시간(ms)</th><th>성공</th><th>시각</th></tr></thead><tbody>';
            data.serviceLogs.forEach(s => {
                const badge = s.isSuccess
                    ? '<span class="badge badge-success">성공</span>'
                    : '<span class="badge badge-danger">실패</span>';
                const time = s.createdAt ? s.createdAt.replace('T',' ').substring(0,19) : '-';
                html += `<tr><td>${s.classMethod}</td><td>${s.executionTimeMs}</td><td>${badge}</td><td>${time}</td></tr>`;
            });
            html += '</tbody></table>';
        } else {
            html += '<div class="info-box">서비스 로그가 없습니다.</div>';
        }

        html += '<div class="section-title" style="margin-top:12px;">에러 로그</div>';
        if (data.errorLogs && data.errorLogs.length > 0) {
            html += '<table class="data-table"><thead><tr><th>에러코드</th><th>메시지</th><th>심각도</th><th>시각</th></tr></thead><tbody>';
            data.errorLogs.forEach(e => {
                const severityBadge = e.severity === 'CRITICAL' ? '<span class="badge badge-danger">CRITICAL</span>'
                    : e.severity === 'WARNING' ? '<span class="badge badge-warning">WARNING</span>'
                        : '<span class="badge badge-success">INFO</span>';
                const time = e.createdAt ? e.createdAt.replace('T',' ').substring(0,19) : '-';
                html += `<tr><td><span class="badge badge-danger">${e.errorCode}</span></td><td>${e.errorMessage}</td><td>${severityBadge}</td><td>${time}</td></tr>`;
            });
            html += '</tbody></table>';
        } else {
            html += '<div class="info-box">에러 로그가 없습니다.</div>';
        }

        el.innerHTML = html;
    }

    // ── 섹션 4: 회원 관리 ─────────────────────────────────
    function loadUsers() {
        fetchWidget('/admin/users', 'usersContent', displayUsers);
    }
    function displayUsers(data, el) {
        if (!data || data.length === 0) { el.innerHTML = '<div class="info-box">회원이 없습니다.</div>'; return; }
        let html = '<table class="data-table"><thead><tr><th>아이디</th><th>이름</th><th>상태</th><th>이력</th><th>관리</th></tr></thead><tbody>';
        data.forEach(u => {
            const isBanned = u.status === 'BANNED';
            const badge = isBanned
                ? '<span class="badge badge-danger">정지</span>'
                : '<span class="badge badge-success">정상</span>';
            const btn = isBanned
                ? `<button class="action-btn unban-btn" onclick="unbanUser(${u.userId})">밴 해제</button>`
                : `<button class="action-btn ban-btn" onclick="banUser(${u.userId})">밴</button>`;
            html += `<tr>
                <td>${u.loginId}</td>
                <td>${u.name}</td>
                <td>${badge}</td>
                <td><button class="link-btn" onclick="openUserModal(${u.userId}, '${u.loginId}')">이력 보기</button></td>
                <td>${btn}</td>
            </tr>`;
        });
        html += '</tbody></table>';
        el.innerHTML = html;
    }

    function loadRecentBans() {
        fetchWidget('/admin/users/RecentBans', 'recentBansContent', displayRecentBans);
    }
    function displayRecentBans(data, el) {
        if (!data || data.length === 0) { el.innerHTML = '<div class="info-box">밴 유저가 없습니다.</div>'; return; }
        let html = '<table class="data-table"><thead><tr><th>아이디</th><th>이름</th><th>관리</th></tr></thead><tbody>';
        data.forEach(u => {
            html += `<tr>
                <td>${u.loginId}</td>
                <td>${u.name}</td>
                <td><button class="action-btn unban-btn" onclick="unbanUser(${u.userId})">밴 해제</button></td>
            </tr>`;
        });
        html += '</tbody></table>';
        el.innerHTML = html;
    }

    function loadWithdrawnUsers() {
        fetchWidget('/admin/users/withdrawn', 'withdrawnContent', displayWithdrawnUsers);
    }
    function displayWithdrawnUsers(data, el) {
        if (!data || data.length === 0) { el.innerHTML = '<div class="info-box">탈퇴 회원이 없습니다.</div>'; return; }
        let html = '<table class="data-table"><thead><tr><th>아이디</th><th>이름</th><th>이메일</th><th>상태</th><th>관리</th></tr></thead><tbody>';
        data.forEach(u => {
            const isBanned = u.status === 'BANNED';
            const badge = isBanned
                ? '<span class="badge badge-danger">밴+탈퇴</span>'
                : '<span class="badge badge-warning">탈퇴</span>';
            const btn = isBanned
                ? `<button class="action-btn unban-btn" onclick="unbanUser(${u.userId})">밴 해제</button>`
                : `<button class="action-btn ban-btn" onclick="banUser(${u.userId})">밴</button>`;
            html += `<tr>
                <td>${u.loginId}</td>
                <td>${u.name}</td>
                <td>${u.email}</td>
                <td>${badge}</td>
                <td>${btn}</td>
            </tr>`;
        });
        html += '</tbody></table>';
        el.innerHTML = html;
    }

    // ── 유저 상세 모달 ──────────────────────────────────────
    function openUserModal(userId, loginId) {
        document.getElementById('userModalTitle').textContent = `${loginId} - 상세 정보`;
        document.getElementById('userModal').classList.add('active');
        const body = document.getElementById('userModalBody');
        body.innerHTML = '<div class="loading">불러오는 중...</div>';
        Promise.all([
            fetch(`/admin/users/${userId}/errors`).then(r => r.json()),
            fetch(`/admin/users/${userId}/service-failures`).then(r => r.json())
        ]).then(([errors, failures]) => {
            displayUserDetail(errors, failures, body);
        }).catch(() => {
            body.innerHTML = '<div class="msg-error">데이터를 불러올 수 없습니다.</div>';
        });
    }
    function displayUserDetail(errors, failures, el) {
        let html = '';

        html += '<div class="section-title">에러 이력</div>';
        if (errors && errors.length > 0) {
            html += '<table class="data-table"><thead><tr><th>에러코드</th><th>메시지</th><th>시각</th></tr></thead><tbody>';
            errors.forEach(e => {
                const time = e.createdAt ? e.createdAt.replace('T',' ').substring(0,19) : '-';
                html += `<tr><td><span class="badge badge-danger">${e.errorCode}</span></td><td>${e.errorMessage}</td><td>${time}</td></tr>`;
            });
            html += '</tbody></table>';
        } else {
            html += '<div class="info-box">에러가 없습니다.</div>';
        }

        html += '<div class="section-title" style="margin-top:12px;">서비스 실패 이력</div>';
        if (failures && failures.length > 0) {
            html += '<table class="data-table"><thead><tr><th>메서드</th><th>실행시간(ms)</th><th>시각</th></tr></thead><tbody>';
            failures.forEach(f => {
                const time = f.createdAt ? f.createdAt.replace('T',' ').substring(0,19) : '-';
                html += `<tr><td>${f.classMethod}</td><td>${f.executionTimeMs}</td><td>${time}</td></tr>`;
            });
            html += '</tbody></table>';
        } else {
            html += '<div class="info-box">실패 이력이 없습니다.</div>';
        }

        el.innerHTML = html;
    }

    // ── 밴/밴해제 ────────────────────────────────────────────
    function banUser(userId) {
        fetch(`/admin/users/${userId}/ban`, { method: 'POST' })
            .then(() => { loadUsers(); loadRecentBans(); loadWithdrawnUsers(); })
            .catch(() => alert('밴 처리에 실패했습니다.'));
    }
    function unbanUser(userId) {
        fetch(`/admin/users/${userId}/unban`, { method: 'POST' })
            .then(() => { loadUsers(); loadRecentBans(); loadWithdrawnUsers(); })
            .catch(() => alert('밴 해제에 실패했습니다.'));
    }

    // ── 초기 로드 ────────────────────────────────────────────
    window.addEventListener('load', () => {
        loadTraffic();
        loadPerformance();
        loadErrors();
        loadUsers();
        loadRecentBans();
        loadWithdrawnUsers();
    });
</script>
<script src="/js/session-timer.js"></script>
</body>
</html>
