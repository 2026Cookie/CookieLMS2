<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>관리자 대시보드 - Cookiego</title>
    <style>
        :root {
            --parchment: #edede9; --dust-grey: #d6ccc2; --linen: #f5ebe0;
            --powder-petal: #e3d5ca; --almond-silk: #d5bdaf;
            --text-primary: #2c2010; --text-secondary: #5c4a3a;
            --text-muted: #8b7355; --text-on-dark: #f5ebe0;
            --btn-dark: #4a3728; --btn-dark-hover: #2c2010;
            --error: #7a3020; --success: #3a6a50; --warning: #7a5c20;
            --shadow: rgba(44,32,16,0.10);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', system-ui, sans-serif; background: var(--parchment); color: var(--text-primary); min-height: 100vh; }
        header {
            background: var(--btn-dark); color: var(--text-on-dark);
            padding: 18px 32px; display: flex; align-items: center; justify-content: space-between;
        }
        .header-left h1 { font-size: 20px; font-weight: 700; }
        .header-left p { font-size: 13px; opacity: 0.7; margin-top: 2px; }
        .main { max-width: 1360px; margin: 0 auto; padding: 32px 24px; }
        .dashboard-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(380px, 1fr)); gap: 20px; }
        .widget {
            background: var(--linen); border: 1px solid var(--dust-grey);
            border-radius: 12px; box-shadow: 0 2px 12px var(--shadow);
            overflow: hidden; transition: box-shadow 0.2s;
        }
        .widget:hover { box-shadow: 0 4px 20px var(--shadow); }
        .widget-header {
            display: flex; justify-content: space-between; align-items: center;
            padding: 14px 18px; background: var(--powder-petal);
            border-bottom: 1px solid var(--dust-grey);
        }
        .widget-header h2 { font-size: 15px; font-weight: 700; color: var(--text-primary); }
        .widget-header button {
            padding: 6px 14px; background: var(--btn-dark); color: var(--text-on-dark);
            border: none; border-radius: 6px; font-size: 12px; font-weight: 600;
            cursor: pointer; transition: background 0.2s;
        }
        .widget-header button:hover { background: var(--btn-dark-hover); }
        .widget-content { min-height: 200px; max-height: 380px; overflow-y: auto; padding: 4px 0; }
        .loading { text-align: center; color: var(--text-muted); padding: 40px; font-size: 14px; }
        .data-table { width: 100%; border-collapse: collapse; font-size: 13px; }
        .data-table th {
            background: var(--parchment); padding: 10px 14px; text-align: left;
            font-size: 12px; font-weight: 700; color: var(--text-muted);
            border-bottom: 1px solid var(--dust-grey); text-transform: uppercase; letter-spacing: 0.3px;
        }
        .data-table td { padding: 10px 14px; border-bottom: 1px solid var(--dust-grey); color: var(--text-primary); }
        .data-table tr:last-child td { border-bottom: none; }
        .data-table tr:hover td { background: var(--powder-petal); }
        .badge {
            display: inline-block; padding: 3px 8px; border-radius: 10px;
            font-size: 11px; font-weight: 700;
        }
        .badge-danger { background: #f9ede9; color: var(--error); }
        .badge-warning { background: #f9f0e0; color: var(--warning); }
        .badge-success { background: #eaf2ed; color: var(--success); }
        .badge-info { background: var(--powder-petal); color: var(--text-secondary); }
        .msg-error { color: var(--error); background: #f9ede9; border: 1px solid #e8c8c0; border-radius: 8px; padding: 10px 14px; font-size: 13px; margin: 12px; }
        .info-box { background: var(--powder-petal); border-left: 3px solid var(--almond-silk); border-radius: 6px; padding: 12px 16px; font-size: 13px; color: var(--text-secondary); margin: 12px; }
        .section-title { font-size: 12px; font-weight: 700; color: var(--text-muted); padding: 12px 14px 6px; text-transform: uppercase; letter-spacing: 0.3px; }
        @media (max-width: 768px) { .dashboard-grid { grid-template-columns: 1fr; } }
    </style>
</head>
<body>
<header>
    <div class="header-left">
        <h1>관리자 대시보드</h1>
        <p>시스템 모니터링 및 관리 센터</p>
    </div>
</header>

<div class="main">
    <div class="dashboard-grid">
        <div class="widget">
            <div class="widget-header">
                <h2>⚠️ 위험 로그</h2>
                <button onclick="loadDangerList()">새로고침</button>
            </div>
            <div class="widget-content" id="dangerListContent"><div class="loading">데이터를 불러오는 중...</div></div>
        </div>

        <div class="widget">
            <div class="widget-header">
                <h2>📋 전체 로그</h2>
                <button onclick="loadLogs()">새로고침</button>
            </div>
            <div class="widget-content" id="logsContent"><div class="loading">데이터를 불러오는 중...</div></div>
        </div>

        <div class="widget">
            <div class="widget-header">
                <h2>👥 회원 관리</h2>
                <button onclick="loadUsers()">새로고침</button>
            </div>
            <div class="widget-content" id="usersContent"><div class="loading">데이터를 불러오는 중...</div></div>
        </div>

        <div class="widget">
            <div class="widget-header">
                <h2>👨‍🏫 강사 승인요청</h2>
                <button onclick="loadInstructorApplications()">새로고침</button>
            </div>
            <div class="widget-content" id="instructorApplicationsContent"><div class="loading">데이터를 불러오는 중...</div></div>
        </div>

        <div class="widget">
            <div class="widget-header">
                <h2>🚫 최근 벤 내역</h2>
                <button onclick="loadRecentBans()">새로고침</button>
            </div>
            <div class="widget-content" id="recentBansContent"><div class="loading">데이터를 불러오는 중...</div></div>
        </div>

        <div class="widget">
            <div class="widget-header">
                <h2>⚡ 성능 메트릭</h2>
                <button onclick="loadMetrics()">새로고침</button>
            </div>
            <div class="widget-content" id="metricsContent"><div class="loading">데이터를 불러오는 중...</div></div>
        </div>
    </div>
</div>

<script>
    function fetchWidget(url, contentId, onSuccess) {
        const el = document.getElementById(contentId);
        el.innerHTML = '<div class="loading">데이터를 불러오는 중...</div>';
        fetch(url).then(r => r.json()).then(d => onSuccess(d, el))
            .catch(() => { el.innerHTML = '<div class="msg-error">데이터를 불러올 수 없습니다.</div>'; });
    }

    function loadDangerList() { fetchWidget('/admin/logs/DangerList', 'dangerListContent', displayDangerList); }
    function loadLogs() { fetchWidget('/admin/logs', 'logsContent', displayLogs); }
    function loadUsers() { fetchWidget('/admin/users', 'usersContent', displayUsers); }
    function loadInstructorApplications() { fetchWidget('/admin/instructor/Applications', 'instructorApplicationsContent', displayInstructorApplications); }
    function loadRecentBans() { fetchWidget('/admin/users/RecentBans', 'recentBansContent', displayRecentBans); }
    function loadMetrics() { fetchWidget('/admin/metrics/speed', 'metricsContent', displayMetrics); }

    function displayDangerList(data, el) { el.innerHTML = '<div class="info-box">데이터가 없습니다.</div>'; }
    function displayLogs(data, el) { el.innerHTML = '<div class="info-box">데이터가 없습니다.</div>'; }
    function displayUsers(data, el) { el.innerHTML = '<div class="info-box">데이터가 없습니다.</div>'; }
    function displayInstructorApplications(data, el) { el.innerHTML = '<div class="info-box">데이터가 없습니다.</div>'; }
    function displayRecentBans(data, el) { el.innerHTML = '<div class="info-box">데이터가 없습니다.</div>'; }

    function displayMetrics(data, el) {
        let html = '';
        html += '<div class="section-title">호출 많은 API TOP 10</div>';
        html += '<table class="data-table"><thead><tr><th>엔드포인트</th><th>호출 수</th><th>평균 응답(ms)</th></tr></thead><tbody>';
        const avgMap = {};
        (data.slowEndpoints || []).forEach(e => { avgMap[e.endpoint] = e.avgMs; });
        (data.topEndpoints || []).forEach(e => {
            const avg = avgMap[e.endpoint] ? avgMap[e.endpoint].toFixed(1) : '-';
            html += `<tr><td>${e.endpoint}</td><td>${e.callCount}</td><td>${avg}</td></tr>`;
        });
        html += '</tbody></table>';
        html += '<div class="section-title">일별 호출 (최근 14일)</div>';
        html += '<table class="data-table"><thead><tr><th>날짜</th><th>호출 수</th></tr></thead><tbody>';
        (data.dailyCalls || []).forEach(d => { html += `<tr><td>${d.day}</td><td>${d.callCount}</td></tr>`; });
        html += '</tbody></table>';
        html += '<div class="section-title">오늘 시간별 트래픽</div>';
        html += '<table class="data-table"><thead><tr><th>시간</th><th>호출 수</th></tr></thead><tbody>';
        (data.hourlyTraffic || []).forEach(h => { html += `<tr><td>${String(h.hour).padStart(2,'0')}:00</td><td>${h.callCount}</td></tr>`; });
        html += '</tbody></table>';
        el.innerHTML = html || '<div class="info-box">데이터가 없습니다.</div>';
    }

    window.addEventListener('load', () => {
        loadDangerList(); loadLogs(); loadUsers();
        loadInstructorApplications(); loadRecentBans(); loadMetrics();
    });
</script>
</body>
</html>
