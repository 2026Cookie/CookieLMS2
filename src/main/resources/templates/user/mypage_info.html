<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>내 정보 - Cookiego</title>
    <style>
        :root {
            --parchment: #edede9; --dust-grey: #d6ccc2; --linen: #f5ebe0;
            --powder-petal: #e3d5ca; --almond-silk: #d5bdaf;
            --text-primary: #2c2010; --text-secondary: #5c4a3a;
            --text-muted: #8b7355; --text-on-dark: #f5ebe0;
            --btn-dark: #4a3728; --btn-dark-hover: #2c2010;
            --shadow: rgba(44,32,16,0.10);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: var(--parchment); color: var(--text-primary);
            min-height: 100vh; display: flex; justify-content: center; align-items: center; padding: 20px;
        }
        .card {
            background: var(--linen); border: 1px solid var(--dust-grey);
            border-radius: 16px; box-shadow: 0 4px 24px var(--shadow);
            padding: 48px 40px; width: 100%; max-width: 440px;
        }
        .back-link { display: inline-flex; align-items: center; gap: 4px; font-size: 13px; color: var(--text-muted); margin-bottom: 28px; text-decoration: none; }
        .back-link:hover { color: var(--text-secondary); }
        h1 { font-size: 22px; font-weight: 700; margin-bottom: 28px; }
        .info-list { display: flex; flex-direction: column; gap: 0; border: 1px solid var(--dust-grey); border-radius: 10px; overflow: hidden; margin-bottom: 24px; }
        .info-row {
            display: flex; align-items: center;
            padding: 14px 16px; background: var(--parchment);
            border-bottom: 1px solid var(--dust-grey);
        }
        .info-row:last-child { border-bottom: none; }
        .info-label { font-size: 13px; font-weight: 600; color: var(--text-muted); width: 90px; flex-shrink: 0; }
        .info-value { font-size: 15px; color: var(--text-primary); font-weight: 500; }
        .btn-row { display: flex; gap: 10px; }
        .btn {
            flex: 1; padding: 12px; border-radius: 8px; font-size: 14px;
            font-weight: 600; cursor: pointer; border: none; text-decoration: none;
            text-align: center; transition: all 0.2s;
        }
        .btn-primary { background: var(--btn-dark); color: var(--text-on-dark); }
        .btn-primary:hover { background: var(--btn-dark-hover); }
        .btn-secondary { background: var(--almond-silk); color: var(--text-primary); }
        .btn-secondary:hover { background: var(--powder-petal); }
    </style>
</head>
<body>
<div class="card">
    <a th:href="@{/user/mypage}" class="back-link">← 마이페이지로 돌아가기</a>
    <h1>내 정보</h1>

    <div class="info-list">
        <div class="info-row">
            <span class="info-label">아이디</span>
            <span class="info-value" th:text="${userInfo.loginId}"></span>
        </div>
        <div class="info-row">
            <span class="info-label">이름</span>
            <span class="info-value" th:text="${userInfo.name}"></span>
        </div>
        <div class="info-row">
            <span class="info-label">닉네임</span>
            <span class="info-value" th:text="${userInfo.nickname}"></span>
        </div>
        <div class="info-row">
            <span class="info-label">이메일</span>
            <span class="info-value" th:text="${userInfo.email}"></span>
        </div>
        <div class="info-row">
            <span class="info-label">전화번호</span>
            <span class="info-value" th:text="${userInfo.phone}"></span>
        </div>
    </div>

    <div class="btn-row">
        <a th:href="@{/user/mypage/edit}" class="btn btn-primary">정보 수정</a>
        <a th:href="@{/user/mypage}" class="btn btn-secondary">돌아가기</a>
    </div>
</div>
<script src="/js/session-timer.js"></script>
</body>
</html>
