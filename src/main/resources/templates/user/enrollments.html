<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>강의 등록 | CookieLMS</title>
    <style>
        body { font-family: 'Arial', sans-serif; padding: 20px; background-color: #f8f9fa; }
        h1 { color: #333; text-align: center; margin-bottom: 20px; }

        .back-btn { display: inline-block; margin-bottom: 20px; padding: 8px 16px; background-color: #6c757d; color: white; border: none; border-radius: 5px; cursor: pointer; text-decoration: none; font-size: 14px; }
        .back-btn:hover { background-color: #5a6268; }

        .search-container { text-align: center; margin-bottom: 30px; }
        .search-input { padding: 10px; width: 300px; font-size: 16px; border: 1px solid #ccc; border-radius: 5px; }
        .search-btn { padding: 10px 20px; font-size: 16px; background-color: #007bff; color: white; border: none; border-radius: 5px; cursor: pointer; }
        .search-btn:hover { background-color: #0056b3; }

        .lecture-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; max-width: 1000px; margin: 0 auto; }
        .lecture-card { background-color: white; border: 1px solid #ddd; border-radius: 10px; padding: 20px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); transition: transform 0.2s; }
        .lecture-card:hover { transform: translateY(-5px); }
        .lecture-title { font-size: 1.2em; font-weight: bold; color: #007bff; margin-bottom: 15px; }
        .lecture-info { color: #555; font-size: 0.9em; line-height: 1.6; margin-bottom: 15px; }
        .thumbnail-box { background-color: #e9ecef; height: 120px; border-radius: 6px; display: flex; align-items: center; justify-content: center; margin-bottom: 15px; color: #888; font-weight: bold; }

        .enroll-btn { width: 100%; padding: 10px; background-color: #28a745; color: white; border: none; border-radius: 5px; cursor: pointer; font-size: 14px; font-weight: bold; }
        .enroll-btn:hover { background-color: #218838; }
        .waitlist-btn { width: 100%; padding: 10px; background-color: #fd7e14; color: white; border: none; border-radius: 5px; cursor: pointer; font-size: 14px; font-weight: bold; }
        .waitlist-btn:hover { background-color: #e8670c; }
        .cancel-btn { width: 100%; padding: 10px; background-color: #dc3545; color: white; border: none; border-radius: 5px; cursor: pointer; font-size: 14px; font-weight: bold; }
        .cancel-btn:hover { background-color: #c82333; }


        .pagination { display: flex; justify-content: center; margin-top: 40px; gap: 10px; }
        .page-btn { padding: 8px 15px; border: 1px solid #007bff; background-color: white; color: #007bff; border-radius: 5px; cursor: pointer; font-weight: bold; }
        .page-btn.active { background-color: #007bff; color: white; }
    </style>
</head>
<body>

<a href="/user/main" class="back-btn">← 메인으로 돌아가기</a>

<h1>📋 강의 등록 페이지</h1>

<div class="search-container">
    <input type="text" id="searchInput" class="search-input" placeholder="강의 제목을 검색해보세요!" onkeyup="if(event.keyCode===13) searchLectures()">
    <button class="search-btn" onclick="searchLectures()">검색</button>
</div>

<div class="lecture-grid" id="lectureList"></div>
<div id="pagination" class="pagination"></div>

<script>
    let currentKeyword = '';
    let currentPage = 0;
    let myEnrolledIds = [];
    let myWaitlistIds = [];

    // 수강 목록 + 대기열 목록 조회 후 강의 목록 로드
    Promise.all([
        fetch('/api/enrollments/my').then(res => res.json()).catch(() => []),
        fetch('/api/waitlist/my').then(res => res.json()).catch(() => [])
    ]).then(([enrolledIds, waitlistIds]) => {
        myEnrolledIds = enrolledIds;
        myWaitlistIds = waitlistIds;
        loadLectures('', 0);
    });

    function searchLectures() {
        const keyword = document.getElementById('searchInput').value;
        loadLectures(keyword, 0);
    }

    function loadLectures(keyword, page) {
        currentKeyword = keyword;
        currentPage = page;

        let url = `/lectures?page=${page}&size=6`;
        if (keyword) {
            url += `&keyword=${encodeURIComponent(keyword)}`;
        }

        fetch(url)
            .then(response => response.json())
            .then(data => {
                const lectureListDiv = document.getElementById('lectureList');
                lectureListDiv.innerHTML = '';

                const lectures = data.content;

                if (lectures.length === 0) {
                    lectureListDiv.innerHTML = '<p style="grid-column: span 3; text-align: center;">강의가 없습니다.</p>';
                    document.getElementById('pagination').innerHTML = '';
                    return;
                }

                lectures.forEach(lecture => {
                    const remaining = lecture.maxCapacity - lecture.currentEnrollment;
                    const isFull = remaining <= 0;

                    const cardHtml = `
                        <div class="lecture-card">
                            <div class="thumbnail-box">썸네일: ${lecture.thumbnail ?? '없음'}</div>
                            <div class="lecture-title">${lecture.title}</div>
                            <div class="lecture-info">
                                👨‍🏫 강사 ID: ${lecture.instructorId}<br>
                                👥 수강 인원: ${lecture.currentEnrollment} / ${lecture.maxCapacity} 명<br>
                                🪑 잔여 정원: ${isFull ? '마감' : remaining + '명'}
                            </div>
                            ${myEnrolledIds.includes(lecture.lectureId)
                                ? `<button class="cancel-btn" onclick="cancel(${lecture.lectureId})">수강 취소</button>`
                                : myWaitlistIds.includes(lecture.lectureId)
                                    ? `<button class="waitlist-btn" onclick="location.href='/user/waitlist/${lecture.lectureId}'">대기열 보기</button>`
                                    : isFull
                                        ? `<button class="waitlist-btn" onclick="registerWaitlist(${lecture.lectureId})">대기열 등록</button>`
                                        : `<button class="enroll-btn" onclick="enroll(${lecture.lectureId})">수강 신청</button>`
                            }
                        </div>
                    `;
                    lectureListDiv.innerHTML += cardHtml;
                });

                renderPagination(data.totalPages, data.number, keyword);
            })
            .catch(error => console.error('에러 발생:', error));
    }

    function renderPagination(totalPages, currentPage, keyword) {
        const paginationDiv = document.getElementById('pagination');
        paginationDiv.innerHTML = '';
        if (totalPages <= 1) return;

        for (let i = 0; i < totalPages; i++) {
            const btn = document.createElement('button');
            btn.innerText = i + 1;
            btn.className = (i === currentPage) ? 'page-btn active' : 'page-btn';
            btn.onclick = () => loadLectures(keyword, i);
            paginationDiv.appendChild(btn);
        }
    }

    function enroll(lectureId) {
        fetch(`/api/enrollments/${lectureId}`, { method: 'POST' })
            .then(res => res.text())
            .then(message => {
                alert(message);
                fetch('/api/enrollments/my')
                    .then(res => res.json())
                    .then(ids => {
                        myEnrolledIds = ids;
                        loadLectures(currentKeyword, currentPage);
                    });
            })
            .catch(() => alert('서버 오류가 발생했습니다. 잠시 후 다시 시도해주세요.'));
    }

    function cancel(lectureId) {
        fetch(`/api/enrollments/${lectureId}`, { method: 'DELETE' })
            .then(res => res.text())
            .then(message => {
                alert(message);
                fetch('/api/enrollments/my')
                    .then(res => res.json())
                    .then(ids => {
                        myEnrolledIds = ids;
                        loadLectures(currentKeyword, currentPage);
                    });
            })
            .catch(() => alert('서버 오류가 발생했습니다.'));
    }

    function registerWaitlist(lectureId) {
        fetch(`/api/waitlist/${lectureId}`, { method: 'POST' })
            .then(res => res.text())
            .then(result => {
                const waitNumber = parseInt(result);
                if (!isNaN(waitNumber)) {
                    location.href = `/user/waitlist/${lectureId}`;
                } else {
                    alert(result);
                }
            })
            .catch(() => alert('서버 오류가 발생했습니다. 잠시 후 다시 시도해주세요.'));
    }

</script>
</body>
</html>
