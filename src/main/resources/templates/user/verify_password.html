<!doctype html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>비밀번호 확인</title>
</head>
<body>
<h1>비밀번호 확인</h1>
<p>개인정보 수정을 위해 비밀번호를 입력해주세요.</p>
<form th:action="@{/user/verify-password}" method="post">
  <input type="password" name="password" placeholder="현재 비밀번호"><br>
  <p th:if="${error}" th:text="${error}" style="color:red"></p>
  <button type="submit">확인</button>
</form>
<a th:href="@{/user/mypage}">마이페이지로 돌아가기</a>
</body>
</html>
