<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>회원가입 완료 - Cookiego</title>
    <style>
        :root {
            --parchment: #edede9; --dust-grey: #d6ccc2; --linen: #f5ebe0;
            --powder-petal: #e3d5ca; --almond-silk: #d5bdaf;
            --text-primary: #2c2010; --text-secondary: #5c4a3a;
            --text-muted: #8b7355; --text-on-dark: #f5ebe0;
            --btn-dark: #4a3728; --shadow: rgba(44,32,16,0.10);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: var(--parchment); color: var(--text-primary);
            min-height: 100vh; display: flex; justify-content: center; align-items: center;
        }
        .card {
            background: var(--linen); border: 1px solid var(--dust-grey);
            border-radius: 16px; box-shadow: 0 4px 24px var(--shadow);
            padding: 56px 48px; width: 100%; max-width: 400px; text-align: center;
        }
        .icon { font-size: 56px; margin-bottom: 20px; }
        h1 { font-size: 22px; font-weight: 700; margin-bottom: 8px; }
        p { font-size: 14px; color: var(--text-muted); margin-bottom: 32px; }
        .btn {
            display: block; padding: 13px 20px; background: var(--btn-dark);
            color: var(--text-on-dark); border-radius: 8px; font-size: 15px;
            font-weight: 600; text-decoration: none; transition: background 0.2s;
        }
        .btn:hover { background: #2c2010; }
    </style>
</head>
<body>
<div class="card">
    <div class="icon">🎉</div>
    <h1>회원가입이 완료되었습니다!</h1>
    <p>Cookiego의 회원이 되신 것을 환영합니다.<br>로그인 후 서비스를 이용해 보세요.</p>
    <a th:href="@{/user/login}" class="btn">로그인 페이지로 이동</a>
</div>
</body>
</html>
