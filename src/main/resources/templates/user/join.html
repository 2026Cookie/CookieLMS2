<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>회원가입 - Cookiego</title>
    <style>
        :root {
            --parchment: #edede9; --dust-grey: #d6ccc2; --linen: #f5ebe0;
            --powder-petal: #e3d5ca; --almond-silk: #d5bdaf;
            --text-primary: #2c2010; --text-secondary: #5c4a3a;
            --text-muted: #8b7355; --text-on-dark: #f5ebe0;
            --btn-dark: #4a3728; --btn-dark-hover: #2c2010;
            --btn-disabled: #b0a090; --shadow: rgba(44,32,16,0.10);
            --error: #c0392b; --success: #27ae60;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: var(--parchment); color: var(--text-primary);
            min-height: 100vh; display: flex; justify-content: center;
            align-items: flex-start; padding: 40px 20px;
        }
        .card {
            background: var(--linen); border: 1px solid var(--dust-grey);
            border-radius: 16px; box-shadow: 0 4px 24px var(--shadow);
            padding: 48px 40px; width: 100%; max-width: 440px;
        }
        .back-link { display: inline-flex; align-items: center; gap: 4px; font-size: 13px; color: var(--text-muted); margin-bottom: 28px; text-decoration: none; }
        .back-link:hover { color: var(--text-secondary); }
        h1 { font-size: 24px; font-weight: 700; margin-bottom: 4px; }
        .subtitle { font-size: 14px; color: var(--text-muted); margin-bottom: 32px; }

        /* Role select */
        .role-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 8px; }
        .role-btn {
            padding: 20px 16px; border: 2px solid var(--dust-grey);
            border-radius: 10px; background: var(--parchment);
            cursor: pointer; text-align: center; transition: all 0.2s;
            font-size: 15px; font-weight: 600; color: var(--text-secondary);
        }
        .role-btn:hover { border-color: var(--almond-silk); background: var(--powder-petal); }
        .role-btn .icon { font-size: 28px; display: block; margin-bottom: 6px; }

        .form-group { margin-bottom: 16px; }
        label { display: block; font-size: 13px; font-weight: 600; color: var(--text-secondary); margin-bottom: 6px; }
        input[type="text"], input[type="email"], input[type="password"] {
            width: 100%; padding: 11px 14px; border: 1px solid var(--dust-grey);
            border-radius: 8px; background: var(--parchment); color: var(--text-primary);
            font-size: 15px; outline: none; transition: border-color 0.2s;
        }
        input:focus { border-color: var(--almond-silk); background: #fff; }
        input.input-error { border-color: var(--error); }
        input.input-ok { border-color: var(--success); }

        .field-error {
            font-size: 12px; color: var(--error); margin-top: 5px;
            display: none;
        }
        .field-error.visible { display: block; }

        /* 비밀번호 조건 안내 */
        .pw-rules {
            background: var(--powder-petal); border-radius: 8px;
            padding: 10px 14px; margin-top: 8px; font-size: 12px;
            color: var(--text-secondary);
        }
        .pw-rules p { margin-bottom: 4px; font-weight: 600; }
        .pw-rule {
            display: flex; align-items: center; gap: 6px;
            margin-top: 3px; transition: color 0.2s;
        }
        .pw-rule .dot {
            width: 7px; height: 7px; border-radius: 50%;
            background: var(--dust-grey); flex-shrink: 0; transition: background 0.2s;
        }
        .pw-rule.met { color: var(--success); }
        .pw-rule.met .dot { background: var(--success); }

        .btn-submit {
            width: 100%; padding: 13px; background: var(--btn-dark); color: var(--text-on-dark);
            border: none; border-radius: 8px; font-size: 15px; font-weight: 600;
            cursor: pointer; margin-top: 8px; transition: background 0.2s;
        }
        .btn-submit:hover:not(:disabled) { background: var(--btn-dark-hover); }
        .btn-submit:disabled {
            background: var(--btn-disabled); cursor: not-allowed; opacity: 0.7;
        }
        .login-link { text-align: center; margin-top: 20px; font-size: 13px; color: var(--text-muted); }
        .login-link a { color: var(--text-secondary); text-decoration: none; font-weight: 600; }
        .login-link a:hover { text-decoration: underline; }
        .role-label {
            display: inline-block; background: var(--powder-petal); color: var(--text-secondary);
            font-size: 12px; font-weight: 600; padding: 3px 10px; border-radius: 20px; margin-bottom: 20px;
        }
        .support-text { margin-top: 16px; font-size: 12px; color: var(--text-muted); text-align: center; }
    </style>
</head>
<body>
<div class="card">
    <a href="/user/login" class="back-link">← 로그인으로 돌아가기</a>
    <h1>회원가입</h1>
    <p class="subtitle">역할을 선택하고 정보를 입력해 주세요</p>

    <!-- 역할 선택 -->
    <div id="roleSelect">
        <div class="role-grid">
            <button type="button" class="role-btn" onclick="selectRole('USER')">
                <span class="icon">🎓</span>학생
            </button>
            <button type="button" class="role-btn" onclick="selectRole('INSTRUCTOR')">
                <span class="icon">👨‍🏫</span>강사
            </button>
        </div>
    </div>

    <!-- 가입 폼 -->
    <form th:action="@{/user/join}" method="post" id="joinForm" style="display:none" novalidate>
        <input type="hidden" name="role" id="roleInput">
        <div id="roleTag"></div>

        <div class="form-group">
            <label>이름</label>
            <input type="text" name="name" id="name" placeholder="이름을 입력하세요">
            <div class="field-error" id="name-error">이름을 입력해주세요!</div>
        </div>

        <div class="form-group">
            <label>닉네임</label>
            <input type="text" name="nickname" id="nickname" placeholder="닉네임을 입력하세요">
            <div class="field-error" id="nickname-error">닉네임을 입력해주세요!</div>
        </div>

        <div class="form-group">
            <label>이메일</label>
            <input type="email" name="email" id="email" placeholder="이메일을 입력하세요">
            <div class="field-error" id="email-error">이메일을 입력해주세요!</div>
        </div>

        <div class="form-group">
            <label>아이디</label>
            <input type="text" name="loginId" id="loginId" placeholder="아이디를 입력하세요">
            <div class="field-error" id="loginId-error">아이디를 입력해주세요!</div>
        </div>

        <div class="form-group">
            <label>비밀번호</label>
            <input type="password" name="password" id="password" placeholder="비밀번호를 입력하세요">
            <div class="pw-rules">
                <p>비밀번호 조건</p>
                <div class="pw-rule" id="rule-length"><span class="dot"></span>8자 이상</div>
                <div class="pw-rule" id="rule-special"><span class="dot"></span>특수문자 포함 (!@#$%^&*)</div>
            </div>
            <div class="field-error" id="password-error">비밀번호를 입력해주세요!</div>
        </div>

        <div class="form-group">
            <label>비밀번호 확인</label>
            <input type="password" name="passwordConfirm" id="passwordConfirm" placeholder="비밀번호를 다시 입력하세요">
            <div class="field-error" id="passwordConfirm-error">비밀번호 확인을 입력해주세요!</div>
        </div>

        <div class="form-group">
            <label>전화번호</label>
            <input type="text" name="phone" id="phone" placeholder="전화번호를 입력하세요">
            <div class="field-error" id="phone-error">전화번호를 입력해주세요!</div>
        </div>

        <button type="submit" class="btn-submit" id="submitBtn" disabled>가입하기</button>
    </form>

    <div class="login-link">이미 계정이 있으신가요? <a th:href="@{/user/login}">로그인</a></div>

    <div class="support-text">고객센터 : 국번없이 111</div>
</div>
<script>
    function selectRole(role) {
        document.getElementById('roleInput').value = role;
        document.getElementById('roleSelect').style.display = 'none';
        document.getElementById('joinForm').style.display = 'block';
        document.getElementById('roleTag').innerHTML =
            `<span class="role-label">${role === 'USER' ? '🎓 학생' : '👨‍🏫 강사'}</span>`;
    }

    const fields = ['name', 'nickname', 'email', 'loginId', 'password', 'passwordConfirm', 'phone'];

    function isPasswordValid(pw) {
        return pw.length >= 8 && /[!@#$%^&*]/.test(pw);
    }

    function updatePasswordRules(pw) {
        const ruleLength = document.getElementById('rule-length');
        const ruleSpecial = document.getElementById('rule-special');
        ruleLength.classList.toggle('met', pw.length >= 8);
        ruleSpecial.classList.toggle('met', /[!@#$%^&*]/.test(pw));
    }

    function validateField(id) {
        const input = document.getElementById(id);
        const error = document.getElementById(id + '-error');
        const value = input.value.trim();

        if (!value) {
            input.classList.add('input-error');
            input.classList.remove('input-ok');
            error.classList.add('visible');
            return false;
        }

        if (id === 'password') {
            if (!isPasswordValid(value)) {
                input.classList.add('input-error');
                input.classList.remove('input-ok');
                error.textContent = '비밀번호 조건을 충족해주세요!';
                error.classList.add('visible');
                return false;
            }
        }

        if (id === 'passwordConfirm') {
            const pw = document.getElementById('password').value;
            if (value !== pw) {
                input.classList.add('input-error');
                input.classList.remove('input-ok');
                error.textContent = '비밀번호가 일치하지 않아요!';
                error.classList.add('visible');
                return false;
            }
        }

        input.classList.remove('input-error');
        input.classList.add('input-ok');
        error.classList.remove('visible');
        return true;
    }

    function checkAllFilled() {
        const allValid = fields.every(id => {
            const val = document.getElementById(id).value.trim();
            if (!val) return false;
            if (id === 'password') return isPasswordValid(val);
            if (id === 'passwordConfirm') return val === document.getElementById('password').value;
            return true;
        });
        document.getElementById('submitBtn').disabled = !allValid;
    }

    fields.forEach(id => {
        const input = document.getElementById(id);
        input.addEventListener('blur', () => validateField(id));
        input.addEventListener('input', () => {
            if (id === 'password') {
                updatePasswordRules(input.value);
                const pwError = document.getElementById('password-error');
                if (input.value && !isPasswordValid(input.value)) {
                    input.classList.add('input-error');
                    input.classList.remove('input-ok');
                    pwError.textContent = '비밀번호 조건을 충족해주세요!';
                    pwError.classList.add('visible');
                } else if (input.value && isPasswordValid(input.value)) {
                    input.classList.remove('input-error');
                    input.classList.add('input-ok');
                    pwError.classList.remove('visible');
                }
            }
            checkAllFilled();
        });
    });

    document.getElementById('joinForm').addEventListener('submit', function(e) {
        let valid = true;
        fields.forEach(id => { if (!validateField(id)) valid = false; });
        if (!valid) e.preventDefault();
    });
</script>
</body>
</html>
