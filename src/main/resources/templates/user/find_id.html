<!doctype html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>아이디 찾기</title>
</head>
<body>
<h1>아이디 찾기</h1>

<form th:action="@{/user/find_id}" method="post">
  <input type="text" name="name" placeholder="이름" required><br>
  <input type="text" name="phone" placeholder="전화번호" required><br>
  <button type="submit">아이디 찾기</button>
</form>

<!-- 결과 출력 -->
<div th:if="${loginId}">
  <p>회원님의 아이디: <strong th:text="${loginId}"></strong></p>
</div>
<div th:if="${error}">
  <p style="color:red;" th:text="${error}"></p>
</div>

<a th:href="@{/user/login}">로그인으로 돌아가기</a>
</body>
</html>
