<!doctype html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>아이디 찾기</title>
</head>
<body>
<h1>아이디 찾기</h1>
<form th:action="@{/user/find_id}" method="post">
    <input type="text" name="name" placeholder="이름"><br>
    <input type="text" name="phone" placeholder="전화번호"><br>
    <button type="submit">확인</button>
</form>
<p th:if="${error}" th:text="${error}" style="color:red"></p>
<p th:if="${loginId}">회원님의 아이디는 <strong th:text="${loginId}"></strong> 입니다.</p>
<a th:href="@{/user/login}">로그인으로 돌아가기</a>
</body>
</html>
