<!doctype html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>비밀번호 찾기</title>
</head>
<body>
<h1>비밀번호 찾기</h1>
<form th:action="@{/user/find_password}" method="post">
  <input type="text" name="loginId" placeholder="아이디"><br>
  <input type="text" name="name" placeholder="이름"><br>
  <input type="text" name="phone" placeholder="전화번호"><br>
  <p th:if="${error}" th:text="${error}" style="color:red"></p>
  <button type="submit">확인</button>
</form>
<a th:href="@{/user/login}">로그인으로 돌아가기</a>
</body>
</html>
