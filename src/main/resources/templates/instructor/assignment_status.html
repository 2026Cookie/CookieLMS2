<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>과제 제출 현황</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body class="bg-light">
<div class="container py-5">
    <div class="card mb-4 border-0 shadow-sm">
        <div class="card-body">
            <div class="card-body">
                <div class="d-flex justify-content-between align-items-center">
                    <h2 class="card-title fw-bold mb-0" th:text="${assignment.title}">과제 제목</h2>

                    <a th:href="@{/instructor/lectures}"
                       class="btn btn-outline-secondary btn-sm"
                       style="border-radius: 8px; padding: 8px 16px; font-weight: 600; text-decoration: none;">
                        ← 강의 목록으로 가기
                    </a>
                </div>
            <p class="text-muted mb-0">
                📅 마감 기한: <span th:text="${#temporals.format(assignment.dueDate, 'yyyy.MM.dd HH:mm')}">2026.04.30</span>
            </p>
        </div>
    </div>

    <div class="row g-3 mb-4">
        <div class="col-md-4">
            <div class="card text-center border-0 shadow-sm">
                <div class="card-body">
                    <h6 class="text-muted">전체 인원</h6>
                    <h3 class="fw-bold" th:text="${totalCount}">0</h3>
                </div>
            </div>
        </div>
        <div class="col-md-4">
            <div class="card text-center border-0 shadow-sm bg-success text-white">
                <div class="card-body">
                    <h6>제출 완료</h6>
                    <h3 class="fw-bold" th:text="${submittedCount}">0</h3>
                </div>
            </div>
        </div>
        <div class="col-md-4">
            <div class="card text-center border-0 shadow-sm bg-danger text-white">
                <div class="card-body">
                    <h6>미제출</h6>
                    <h3 class="fw-bold" th:text="${unsubmittedCount}">0</h3>
                </div>
            </div>
        </div>
    </div>

    <div class="card border-0 shadow-sm">
        <div class="card-header bg-white py-3">
            <h5 class="mb-0 fw-bold">수강생별 제출 상세 정보</h5>
        </div>
        <div class="table-responsive">
            <table class="table table-hover align-middle mb-0">
                <thead class="table-light">
                <tr>
                    <th>이름</th>
                    <th>이메일 / 연락처</th>
                    <th>제출 시각</th>
                    <th class="text-center">상태</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="student : ${students}">
                    <td class="fw-bold" th:text="${student.name}">김쿠키</td>
                    <td>
                        <div class="small" th:text="${student.email}">cookie@email.com</div>
                        <div class="small text-muted" th:text="${student.phone}">010-1234-5678</div>
                    </td>
                    <td th:text="${student.submittedAt != null ? #temporals.format(student.submittedAt, 'MM.dd HH:mm') : '-'}">
                        04.20 21:55
                    </td>
                    <td class="text-center">
                        <span th:if="${student.isSubmitted()}" class="badge bg-success">제출 완료</span>
                        <span th:unless="${student.isSubmitted()}" class="badge bg-secondary">미제출</span>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>
</body>
</html>
