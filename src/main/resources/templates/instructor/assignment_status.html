<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>과제 제출 현황 - Cookiego</title>
    <style>
        :root {
            --parchment: #edede9; --dust-grey: #d6ccc2; --linen: #f5ebe0;
            --powder-petal: #e3d5ca; --almond-silk: #d5bdaf;
            --text-primary: #2c2010; --text-secondary: #5c4a3a;
            --text-muted: #8b7355; --text-on-dark: #f5ebe0;
            --btn-dark: #4a3728; --btn-dark-hover: #2c2010;
            --shadow: rgba(44,32,16,0.10);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', system-ui, sans-serif; background: var(--parchment); color: var(--text-primary); min-height: 100vh; }
        header {
            background: var(--linen); border-bottom: 1px solid var(--dust-grey);
            padding: 16px 32px; display: flex; align-items: center; justify-content: space-between;
        }
        .logo { font-size: 18px; font-weight: 700; color: var(--text-primary); text-decoration: none; }
        .header-right { display: flex; align-items: center; gap: 16px; }
        .header-right a { font-size: 14px; color: var(--text-secondary); text-decoration: none; }
        .header-right a:hover { color: var(--text-primary); }
        .btn-logout {
            padding: 7px 16px; background: transparent; border: 1.5px solid var(--almond-silk);
            border-radius: 6px; font-size: 13px; color: var(--text-secondary);
            cursor: pointer; transition: all 0.2s;
        }
        .btn-logout:hover { background: var(--powder-petal); }
        .main { max-width: 800px; margin: 0 auto; padding: 40px 24px; }

        /* 상단 카드 */
        .title-card {
            background: var(--linen); border: 1px solid var(--dust-grey);
            border-radius: 12px; padding: 20px 24px; margin-bottom: 20px;
            box-shadow: 0 2px 8px var(--shadow);
            display: flex; align-items: center; justify-content: space-between; gap: 16px;
        }
        .title-card h2 { font-size: 20px; font-weight: 700; }
        .title-card .due { font-size: 13px; color: var(--text-muted); margin-top: 6px; }
        .btn-back {
            padding: 8px 16px; background: transparent; border: 1.5px solid var(--almond-silk);
            border-radius: 7px; font-size: 13px; font-weight: 600; color: var(--text-secondary);
            text-decoration: none; white-space: nowrap; transition: all 0.2s;
        }
        .btn-back:hover { background: var(--almond-silk); color: var(--text-primary); }

        /* 통계 카드 3개 */
        .stat-row { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 12px; margin-bottom: 20px; }
        .stat-card {
            background: var(--linen); border: 1px solid var(--dust-grey);
            border-radius: 12px; padding: 18px; text-align: center;
            box-shadow: 0 2px 8px var(--shadow);
        }
        .stat-card.submitted { background: #5c7c5f; border-color: #4a6650; color: var(--text-on-dark); }
        .stat-card.unsubmitted { background: #8b4a4a; border-color: #6e3535; color: var(--text-on-dark); }
        .stat-label { font-size: 12px; font-weight: 600; color: var(--text-muted); margin-bottom: 6px; }
        .stat-card.submitted .stat-label,
        .stat-card.unsubmitted .stat-label { color: rgba(245,235,224,0.8); }
        .stat-value { font-size: 28px; font-weight: 700; }

        /* 테이블 카드 */
        .table-card {
            background: var(--linen); border: 1px solid var(--dust-grey);
            border-radius: 12px; overflow: hidden;
            box-shadow: 0 2px 8px var(--shadow);
        }
        .table-card-header {
            padding: 16px 20px; border-bottom: 1px solid var(--dust-grey);
            font-size: 15px; font-weight: 700;
        }
        table { width: 100%; border-collapse: collapse; }
        thead tr { background: var(--powder-petal); }
        th {
            padding: 12px 16px; text-align: left;
            font-size: 12px; font-weight: 700; color: var(--text-muted);
            text-transform: uppercase; letter-spacing: 0.4px;
        }
        th.center { text-align: center; }
        td { padding: 14px 16px; font-size: 14px; border-top: 1px solid var(--dust-grey); }
        tr:hover td { background: var(--powder-petal); }
        .td-name { font-weight: 600; }
        .td-sub { font-size: 12px; color: var(--text-muted); margin-top: 2px; }
        .td-center { text-align: center; }
        .badge-submitted {
            display: inline-block; padding: 4px 10px;
            background: #5c7c5f; color: var(--text-on-dark);
            border-radius: 20px; font-size: 12px; font-weight: 600;
        }
        .badge-pending {
            display: inline-block; padding: 4px 10px;
            background: var(--almond-silk); color: var(--text-secondary);
            border-radius: 20px; font-size: 12px; font-weight: 600;
        }
    </style>
</head>
<body>
<header>
    <a th:href="@{/instructor/main}" class="logo">Cookiego</a>
    <div class="header-right">
        <a th:href="@{/user/mypage}">마이페이지</a>
        <form th:action="@{/logout}" method="post" style="display:inline;">
            <button type="submit" class="btn-logout">로그아웃</button>
        </form>
    </div>
</header>

<div class="main">
    <div class="title-card">
        <div>
            <h2 th:text="${assignment.title}">과제 제목</h2>
            <div class="due">📅 마감 기한: <span th:text="${#temporals.format(assignment.dueDate, 'yyyy.MM.dd HH:mm')}">2026.04.30</span></div>
        </div>
        <a th:href="@{/instructor/lectures}" class="btn-back">← 강의 목록으로 가기</a>
    </div>

    <div class="stat-row">
        <div class="stat-card">
            <div class="stat-label">전체 인원</div>
            <div class="stat-value" th:text="${totalCount}">0</div>
        </div>
        <div class="stat-card submitted">
            <div class="stat-label">제출 완료</div>
            <div class="stat-value" th:text="${submittedCount}">0</div>
        </div>
        <div class="stat-card unsubmitted">
            <div class="stat-label">미제출</div>
            <div class="stat-value" th:text="${unsubmittedCount}">0</div>
        </div>
    </div>

    <div class="table-card">
        <div class="table-card-header">수강생별 제출 상세 정보</div>
        <table>
            <thead>
            <tr>
                <th>이름</th>
                <th>이메일 / 연락처</th>
                <th>제출 시각</th>
                <th class="center">상태</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="student : ${students}">
                <td class="td-name" th:text="${student.name}">김쿠키</td>
                <td>
                    <div th:text="${student.email}">cookie@email.com</div>
                    <div class="td-sub" th:text="${student.phone}">010-1234-5678</div>
                </td>
                <td th:text="${student.submittedAt != null ? #temporals.format(student.submittedAt, 'MM.dd HH:mm') : '-'}">04.20 21:55</td>
                <td class="td-center">
                    <span th:if="${student.isSubmitted()}" class="badge-submitted">제출 완료</span>
                    <span th:unless="${student.isSubmitted()}" class="badge-pending">미제출</span>
                </td>
            </tr>
            </tbody>
        </table>
    </div>
</div>
<script src="/js/session-timer.js"></script>
</body>
</html>
