<!doctype html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>안내 - CookieLMS</title>
</head>
<body>
<div class="error-container">
    <div class="error-code" th:text="${status}">404</div>
    <div class="error-title">요청 처리에 실패했습니다</div>
    <div class="error-message" th:text="${message}">입력하신 주소가 잘못되었거나 삭제된 페이지입니다.</div>

    <div class="error-details">
        <div class="detail-item">
            <span class="detail-label">요청 경로:</span>
            <span class="detail-value" th:text="${requestUri}">/unknown-page</span>
        </div>
        <div class="detail-item">
            <span class="detail-label">추적 ID:</span>
            <span class="detail-value" th:text="${traceId}">trace-id</span>
        </div>
    </div>

    <div class="action-buttons">
        <button class="btn btn-primary" onclick="history.back()">이전으로 돌아가기</button>
        <button class="btn btn-secondary" onclick="location.href='/'">홈으로</button>
    </div>
</div>
</body>
</html>
