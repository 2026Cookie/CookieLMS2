<!doctype html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>페이지를 찾을 수 없습니다 - 404</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Oxygen', 'Ubuntu', 'Cantarell', 'Fira Sans', 'Droid Sans', 'Helvetica Neue', sans-serif;
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .error-container {
            background: white;
            border-radius: 10px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
            padding: 60px 40px;
            max-width: 600px;
            text-align: center;
        }

        .error-code {
            font-size: 120px;
            font-weight: bold;
            color: #f5576c;
            margin-bottom: 20px;
        }

        .error-title {
            font-size: 32px;
            font-weight: 700;
            color: #333;
            margin-bottom: 15px;
        }

        .error-description {
            font-size: 18px;
            color: #666;
            margin-bottom: 10px;
        }

        .error-message {
            font-size: 14px;
            color: #999;
            margin-bottom: 30px;
        }

        .error-details {
            background: #fff5f7;
            border-left: 4px solid #f5576c;
            padding: 15px;
            margin-bottom: 30px;
            text-align: left;
            border-radius: 4px;
        }

        .detail-item {
            margin: 10px 0;
            font-size: 14px;
            color: #555;
        }

        .detail-label {
            font-weight: 600;
            color: #333;
            display: inline-block;
            width: 100px;
        }

        .detail-value {
            word-break: break-all;
            color: #666;
        }

        .action-buttons {
            display: flex;
            gap: 15px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .btn {
            padding: 12px 30px;
            font-size: 16px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            text-decoration: none;
            display: inline-block;
            transition: all 0.3s ease;
        }

        .btn-primary {
            background: #f5576c;
            color: white;
        }

        .btn-primary:hover {
            background: #e84856;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(245, 87, 108, 0.4);
        }

        .btn-secondary {
            background: #e0e0e0;
            color: #333;
        }

        .btn-secondary:hover {
            background: #d0d0d0;
            transform: translateY(-2px);
        }

        .status-info {
            margin-top: 30px;
            padding-top: 30px;
            border-top: 1px solid #eee;
            font-size: 13px;
            color: #999;
        }
    </style>
</head>
<body>
    <div class="error-container">
        <div class="error-code">404</div>
        <div class="error-title">페이지를 찾을 수 없습니다</div>
        <div class="error-description">요청한 리소스가 존재하지 않습니다.</div>
        <div class="error-message" th:text="${message}">페이지가 삭제되었거나 이동되었을 수 있습니다.</div>

        <div class="error-details">
            <div class="detail-item" th:if="${requestUri}">
                <span class="detail-label">요청 경로:</span>
                <span class="detail-value" th:text="${requestUri}"></span>
            </div>
            <div class="detail-item" th:if="${traceId}">
                <span class="detail-label">추적 ID:</span>
                <span class="detail-value" th:text="${traceId}"></span>
            </div>
        </div>

        <div class="action-buttons">
            <button class="btn btn-primary" onclick="location.href='/'">홈으로 돌아가기</button>
            <button class="btn btn-secondary" onclick="location.back()">이전 페이지</button>
        </div>

        <div class="status-info">
            지속적인 문제가 발생하면 관리자에게 문의하세요.
            <span th:if="${traceId}">추적 ID: <strong th:text="${traceId}"></strong></span>
        </div>
    </div>
</body>
</html>
