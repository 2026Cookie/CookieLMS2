<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>과제 제출</title>
</head>
<body>

<div th:if="${errorMessage}" style="color: red;">
    <strong>오류 발생:</strong> <span th:text="${errorMessage}"></span>
</div>

<div>
    <h2>과제 제출</h2>
    <p>과제명: <span th:text="${assignment.title}"></span></p>
    <p>마감 기한: <span th:text="${#temporals.format(assignment.dueDate, 'yyyy-MM-dd HH:mm')}"></span></p>
</div>

<form id="uploadForm" th:action="@{|/student/assignments/${assignment.assignmentId}/submit|}" method="post" enctype="multipart/form-data" onsubmit="return showProgress(event)">

    <div>
        <label for="uploadFile">첨부 파일 (PDF만 가능, 최대 5MB):</label>
        <input type="file" id="uploadFile" name="uploadFile" accept=".pdf" required>
    </div>

    <div id="progressContainer" style="display: none;">
        <p>업로드 진행 중... <span id="progressText">0%</span></p>
    </div>

    <br>
    <button type="submit" id="submitBtn">과제 제출하기</button>
    <button type="button" onclick="history.back()">뒤로 가기</button>
</form>

<script>
    function showProgress(event) {
        const fileInput = document.getElementById('uploadFile');

        if (fileInput.files.length > 0) {
            const file = fileInput.files[0];
            const maxSize = 5 * 1024 * 1024;

            if (file.size > maxSize) {
                alert("5MB를 초과하는 파일은 업로드할 수 없습니다.");
                fileInput.value = '';
                event.preventDefault();
                return false;
            }

            if (!file.name.toLowerCase().endsWith('.pdf')) {
                alert("PDF 파일만 업로드 가능합니다.");
                fileInput.value = '';
                event.preventDefault();
                return false;
            }
        }

        const submitBtn = document.getElementById('submitBtn');
        submitBtn.disabled = true;
        submitBtn.innerText = '서버로 전송 중입니다...';

        document.getElementById('progressContainer').style.display = 'block';

        let progress = 0;
        const progressText = document.getElementById('progressText');

        const interval = setInterval(() => {
            progress += Math.floor(Math.random() * 15) + 5;
            if (progress >= 95) {
                progress = 95;
                clearInterval(interval);
            }
            progressText.innerText = progress + '%';
        }, 300);

        return true;
    }
</script>
</body>
</html>
