<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>к°•мқҳ мғҒм„ё</title>
</head>
<body>

<div th:if="${errorMessage}" style="color: red;">
  <strong>м•ҲлӮҙ:</strong> <span th:text="${errorMessage}"></span>
</div>

<div id="thumbnailArea">лЎңл”© мӨ‘...</div>

<hr>

<div>
  <div>
    <span id="instructorInfo">к°•мӮ¬: лЎңл”© мӨ‘</span> |
    <span id="capacityInfo">мқёмӣҗ: лЎңл”© мӨ‘</span>
  </div>
  <h1 id="lectureTitle">к°•мқҳ м ңлӘ©мқ„ л¶Ҳлҹ¬мҳӨлҠ” мӨ‘мһ…лӢҲлӢӨ...</h1>
  <p id="lectureDesc">к°•мқҳ мғҒм„ё м„ӨлӘ…мқ„ л¶Ҳлҹ¬мҳӨлҠ” мӨ‘мһ…лӢҲлӢӨ.</p>

  <div id="buttonArea"></div>
</div>

<div id="videoModal" style="display: none; border: 1px solid black; padding: 20px; margin-top: 20px;">
  <div>
    <strong id="modalTitle">к°•мқҳ мҳҒмғҒ мһ¬мғқ</strong>
    <button onclick="closeVideo()">лӢ«кё°</button>
  </div>
  <br>
  <div>
    <iframe id="videoPlayer" src="" frameborder="0" allowfullscreen width="640" height="360"></iframe>
  </div>
</div>

<script>
  document.addEventListener("DOMContentLoaded", function() {
    const pathParts = window.location.pathname.split('/');
    const lectureId = pathParts[pathParts.length - 1];

    fetch(`/lectures/${lectureId}`)
            .then(response => {
              if(!response.ok) throw new Error("к°•мқҳ м •ліҙлҘј л¶Ҳлҹ¬мҳӨм§Җ лӘ»н–ҲмҠөлӢҲлӢӨ.");
              return response.json();
            })
            .then(data => {
              document.getElementById('lectureTitle').innerText = data.title;
              document.getElementById('modalTitle').innerText = data.title;
              document.getElementById('lectureDesc').innerText = data.description;
              document.getElementById('instructorInfo').innerText = `к°•мӮ¬ ID: ${data.instructorId}`;
              document.getElementById('capacityInfo').innerText = `мқёмӣҗ: ${data.currentEnrollment} / ${data.maxCapacity} лӘ…`;

              if(data.thumbnail) {
                // мҚёл„Өмқј widthлҘј 200 м§Җм •
                document.getElementById('thumbnailArea').innerHTML = `<img src="/images/${data.thumbnail}" alt="${data.title} мҚёл„Өмқј" width="200" onerror="this.style.display='none'; this.parentNode.innerText='мқҙлҜём§Җ м—ҶмқҢ';">`;
              } else {
                document.getElementById('thumbnailArea').innerText = 'л“ұлЎқлҗң мҚёл„Өмқјмқҙ м—ҶмҠөлӢҲлӢӨ.';
              }

              const buttonArea = document.getElementById('buttonArea');
              const isEnrolled = data.enrolled === true || data.isEnrolled === true;

              if (isEnrolled) {
                buttonArea.innerHTML = `
                        <button onclick="playVideo(${lectureId})">к°•мқҳ мҳҒмғҒ мһ¬мғқ</button>
                        <button onclick="downloadMaterial(${lectureId})">н•ҷмҠө мһҗлЈҢ лӢӨмҡҙлЎңл“ң</button>
                        <button onclick="goToAssignment(${lectureId})">кіјм ң м ңм¶ңн•ҳкё°</button>
                    `;
              } else {
                buttonArea.innerHTML = `
                        <div>
                            рҹ”’ к°•мқҳлҘј мӢңмІӯн•ҳмӢңл Өл©ҙ лЁјм Җ мҲҳк°•мӢ мІӯмқ„ мҷ„лЈҢн•ҙмЈјм„ёмҡ”.<br>
                            <small>(мҲҳк°•мӢ мІӯмқҖ 'к°•мқҳ л“ұлЎқ' нҺҳмқҙм§Җм—җм„ң м§„н–ү)</small>
                        </div>
                    `;
              }
            })
            .catch(error => {
              console.error("Error:", error);
              alert("к°•мқҳ м •ліҙлҘј л¶Ҳлҹ¬мҳӨлҠ” мӨ‘ мҳӨлҘҳк°Җ л°ңмғқн–ҲмҠөлӢҲлӢӨ.");
            });
  });

  function playVideo(lectureId) {
    fetch(`/lectures/${lectureId}/video`)
            .then(response => {
              if (response.status === 403) { throw new Error("мҲҳк°•мғқл§Ң мӢңмІӯн•  мҲҳ мһҲмҠөлӢҲлӢӨ."); }
              if (!response.ok) { throw new Error("мҳҒмғҒмқ„ л¶Ҳлҹ¬мҳӨлҠ”лҚ° мӢӨнҢЁн–ҲмҠөлӢҲлӢӨ."); }
              return response.text();
            })
            .then(url => {
              let finalUrl = url;
              if(url.includes("video.url")) {
                finalUrl = "https://www.youtube.com/embed/jNQXAC9IVRw";
              }
              document.getElementById('videoPlayer').src = finalUrl;
              document.getElementById('videoModal').style.display = 'block'; // flex лҢҖмӢ  лё”лЎқмңјлЎң н‘ңмӢң
            })
            .catch(error => { alert(error.message); });
  }

  function closeVideo() {
    const modal = document.getElementById('videoModal');
    const iframe = document.getElementById('videoPlayer');
    modal.style.display = 'none';
    iframe.src = "";
  }

  function downloadMaterial(lectureId) {
    if(!lectureId) { alert("к°•мқҳ м •ліҙлҘј м°ҫмқ„ мҲҳ м—ҶмҠөлӢҲлӢӨ."); return; }
    window.location.href = `/lectures/${lectureId}/material`;
  }

  function goToAssignment(lectureId) {
    if(!lectureId) { alert("к°•мқҳ м •ліҙлҘј м°ҫмқ„ мҲҳ м—ҶмҠөлӢҲлӢӨ."); return; }
    window.location.href = `/student/assignments/${lectureId}`;
  }
</script>

</body>
</html>
